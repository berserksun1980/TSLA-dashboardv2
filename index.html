            const pwd = document.getElementById('pwd').value;
            try {
                const bytes = CryptoJS.AES.decrypt(ciphertext, pwd);
                const html  = bytes.toString(CryptoJS.enc.Utf8);
                if (html) {
                    document.open();
                    document.write(html);
                    document.close();

                document.getElementById('err').classList.remove('hidden');
